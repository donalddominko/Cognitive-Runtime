name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # contributor-assistant/github-action v2.6.1 pinned to commit SHA.
        # NOTE: this action's repo was archived (read-only) on 2026-03-23 and is
        # no longer maintained. Pinning to a SHA mitigates supply-chain risk.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN is used to commit signatures to this repo.
          # Required if 'main' is a protected branch; otherwise GITHUB_TOKEN suffices
          # and this line (plus the secret) can be removed.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/donalddominko/Cognitive-Runtime/blob/main/CLA.md'
          branch: 'main'
          allowlist: donalddominko,bot*,dependabot[bot]
