services:
  postgres:
    image: postgres:16-alpine
    container_name: cognitive-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognitive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cognitive}
      POSTGRES_DB: ${POSTGRES_DB:-cognitive_runtime}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cognitive} -d ${POSTGRES_DB:-cognitive_runtime}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cognitive-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognitive-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cognitive-network

  redis:
    image: redis:7-alpine
    container_name: cognitive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    networks:
      - cognitive-network

  llama:
    build:
      context: .
      dockerfile: Dockerfile.llama
    container_name: cognitive-llama
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - cognitive-network
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 2G

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cognitive-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognitive}:${POSTGRES_PASSWORD:-cognitive}@postgres:5432/${POSTGRES_DB:-cognitive_runtime}
      QDRANT_URL: http://qdrant:6333
      LLAMA_URL: http://llama:8080
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: runs
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-llama_cpp}
      LLAMA_EMBEDDINGS_URL: http://llama:8080/v1/embeddings
      EMBEDDING_TIMEOUT_MS: "30000"
      EMBEDDING_ALLOW_DEV_FALLBACK: "true"
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      CACHE_EMBEDDINGS: ${CACHE_EMBEDDINGS:-true}
      CACHE_RETRIEVAL: ${CACHE_RETRIEVAL:-false}
      CACHE_WORKING_CONTEXT: ${CACHE_WORKING_CONTEXT:-true}
      ENABLE_CODE_CHANGE_WORKFLOW: ${ENABLE_CODE_CHANGE_WORKFLOW:-false}
      ENABLE_REPLANNING: ${ENABLE_REPLANNING:-false}
      ENABLE_POLICY_GATE: ${ENABLE_POLICY_GATE:-false}
      ENABLE_RUN_CANCELLATION: ${ENABLE_RUN_CANCELLATION:-true}
      MAX_PLANNER_LOOPS: ${MAX_PLANNER_LOOPS:-3}
      RUN_TIMEOUT_MS: ${RUN_TIMEOUT_MS:-300000}
      STALE_HEARTBEAT_MS: ${STALE_HEARTBEAT_MS:-60000}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      llama:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3001/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - cognitive-network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: cognitive-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognitive}:${POSTGRES_PASSWORD:-cognitive}@postgres:5432/${POSTGRES_DB:-cognitive_runtime}
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: runs
      LLAMA_URL: http://llama:8080
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-llama_cpp}
      LLAMA_EMBEDDINGS_URL: http://llama:8080/v1/embeddings
      EMBEDDING_TIMEOUT_MS: "30000"
      EMBEDDING_ALLOW_DEV_FALLBACK: ${EMBEDDING_ALLOW_DEV_FALLBACK:-true}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      CACHE_EMBEDDINGS: ${CACHE_EMBEDDINGS:-true}
      CACHE_RETRIEVAL: ${CACHE_RETRIEVAL:-false}
      CACHE_WORKING_CONTEXT: ${CACHE_WORKING_CONTEXT:-true}
      WORKER_HEARTBEAT_MS: "30000"
      ENABLE_CODE_CHANGE_WORKFLOW: ${ENABLE_CODE_CHANGE_WORKFLOW:-false}
      ENABLE_REPLANNING: ${ENABLE_REPLANNING:-false}
      ENABLE_POLICY_GATE: ${ENABLE_POLICY_GATE:-false}
      ENABLE_RUN_CANCELLATION: ${ENABLE_RUN_CANCELLATION:-true}
      MAX_PLANNER_LOOPS: ${MAX_PLANNER_LOOPS:-3}
      RUN_TIMEOUT_MS: ${RUN_TIMEOUT_MS:-300000}
      STALE_HEARTBEAT_MS: ${STALE_HEARTBEAT_MS:-60000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
      llama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cognitive-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cognitive-web
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cognitive-network

  web-dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: cognitive-web-dev
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3001}
    ports:
      - "${WEB_DEV_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cognitive-network

volumes:
  postgres_data:
    name: cognitive-postgres-data
  qdrant_data:
    name: cognitive-qdrant-data
  redis_data:
    name: cognitive-redis-data

networks:
  cognitive-network:
    name: cognitive-network
    driver: bridge
